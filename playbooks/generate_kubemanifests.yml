---
- name: Generate kubemanifests files
  hosts: all
  gather_facts: false
  vars:
    generate_kubemanifests_template_empty: true
  tasks:
    - name: Import role
      ansible.builtin.import_role:
        name: aap.platform_on_ocp.generate_kubemanifests
      delegate_to: localhost
      when: namespace is defined
